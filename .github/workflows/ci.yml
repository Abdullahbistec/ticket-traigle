name: CI

on:
  push:
    branches: [main]
  pull_request:

# The Next.js app lives in a nested subfolder, so every `run` step executes there.
defaults:
  run:
    working-directory: "weekly challange/abdullah-month1-ticket-triage"

env:
  DATABASE_URL: "file:./dev.db"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: "weekly challange/abdullah-month1-ticket-triage/pnpm-lock.yaml"

      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: "weekly challange/abdullah-month1-ticket-triage/.next/cache"
          key: ${{ runner.os }}-next-${{ hashFiles('weekly challange/abdullah-month1-ticket-triage/pnpm-lock.yaml') }}-${{ hashFiles('weekly challange/abdullah-month1-ticket-triage/src/**', 'weekly challange/abdullah-month1-ticket-triage/prisma/**') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('weekly challange/abdullah-month1-ticket-triage/pnpm-lock.yaml') }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Create + seed database
        run: |
          pnpm exec prisma db push --skip-generate
          pnpm exec tsx prisma/seed.ts

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
