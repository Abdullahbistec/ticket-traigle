version: 1
goals:
  - Scaffold a ticket triage dashboard from the PRD, spec-first

tasks:
  - id: T1
    story: S-001
    title: Prisma schema
    prompt: >
      Read docs/spec/prd.md FR-1..FR-3.
      Generate prisma/schema.prisma with a Ticket model that has:
      id (cuid), title, body, priority (P0/P1/P2), owner (nullable),
      status (OPEN/IN_PROGRESS/RESOLVED), channel, createdAt, updatedAt.
      SQLite datasource. Do not add fields not in the PRD.
    files: [prisma/schema.prisma]
    estimate: 15m

  - id: T2
    story: S-001
    title: Prisma seed data
    prompt: >
      Read prisma/schema.prisma.
      Generate prisma/seed.ts with 7 seed tickets covering P0/P1/P2
      that match the personas in docs/spec/prd.md §1.
      Use tsx to run it: add "db:seed": "tsx prisma/seed.ts" to package.json.
    files: [prisma/seed.ts]
    estimate: 15m
    dependsOn: [T1]

  - id: T3
    story: S-002
    title: GET /tickets API
    prompt: >
      Read prisma/schema.prisma and docs/spec/prd.md FR-4.
      Generate src/app/api/tickets/route.ts (Next.js 15 App Router).
      GET returns { tickets, grouped: {P0,P1,P2}, counts }.
      Use the shared db client at src/lib/db.ts.
    files: [src/app/api/tickets/route.ts, src/lib/db.ts]
    estimate: 20m
    dependsOn: [T1]

  - id: T4
    story: S-003
    title: PATCH /tickets/:id API
    prompt: >
      Read docs/spec/prd.md FR-5 and src/types/ticket.ts.
      Generate src/app/api/tickets/[id]/route.ts.
      PATCH validates body with PatchTicketSchema (Zod).
      Returns 400 with issues on invalid input, 404 if not found, 200 with updated ticket.
      Zero any types.
    files: [src/app/api/tickets/[id]/route.ts, src/types/ticket.ts]
    estimate: 25m
    dependsOn: [T3]

  - id: T5
    story: S-004
    title: Tickets dashboard page
    prompt: >
      Read src/app/api/tickets/route.ts and docs/spec/prd.md FR-1..FR-2.
      Generate src/app/tickets/page.tsx (Next.js 15 server component).
      Groups tickets by priority with count badges.
      Uses Tailwind dark theme. No client components.
      Zero any types.
    files: [src/app/tickets/page.tsx]
    estimate: 30m
    dependsOn: [T3]

  - id: T6
    story: S-005
    title: Zod schemas + type exports
    prompt: >
      Generate src/types/ticket.ts with:
      PrioritySchema (P0/P1/P2), StatusSchema, PatchTicketSchema.
      Export inferred types. Export PRIORITY_LABELS and PRIORITY_ORDER maps.
      No any types, strict Zod.
    files: [src/types/ticket.ts]
    estimate: 15m

  - id: T7
    story: S-006
    title: Vitest smoke tests
    prompt: >
      Read src/types/ticket.ts.
      Generate tests/smoke.test.ts with 8 Vitest tests covering:
      valid priority/owner/status patches, combined patch,
      invalid priority, empty owner, unknown fields, empty object.
      Must all pass without a database.
    files: [tests/smoke.test.ts, vitest.config.ts]
    estimate: 20m
    dependsOn: [T6]

  - id: T8
    story: S-007
    title: GitHub Actions CI
    prompt: >
      Generate .github/workflows/ci.yml.
      Jobs: lint, typecheck, test, prisma generate, build.
      Uses pnpm/action-setup@v4, setup-node with pnpm cache.
      Must complete in under 3 minutes. DATABASE_URL set for build step.
    files: [.github/workflows/ci.yml]
    estimate: 15m
